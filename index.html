<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mesin Jurnal</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f0f4f8; color: #333; }
  .container { max-width: 860px; margin: 40px auto; padding: 20px; }
  h1 { text-align: center; color: #2563eb; margin-bottom: 30px; font-size: 28px; }
  .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  h2 { margin-bottom: 12px; color: #1e40af; }
  label { font-weight: bold; display: block; margin-bottom: 6px; font-size: 14px; color: #555; }
  input[type=text] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
  input[type=file] { margin-top: 10px; width: 100%; border: 2px dashed #93c5fd; padding: 12px; border-radius: 8px; background: #eff6ff; cursor: pointer; }
  button { margin-top: 12px; padding: 10px 24px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: bold; }
  button:hover { background: #1d4ed8; }
  button:disabled { background: #93c5fd; cursor: not-allowed; }
  .jurnal-card { background: white; border: 1px solid #e2e8f0; border-radius: 10px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); transition: box-shadow 0.2s; }
  .jurnal-card:hover { box-shadow: 0 4px 12px rgba(37,99,235,0.12); }
  .jurnal-title { font-size: 15px; font-weight: bold; color: #1e40af; margin-bottom: 8px; line-height: 1.4; }
  .jurnal-title a { color: #1e40af; text-decoration: none; }
  .jurnal-title a:hover { text-decoration: underline; }
  .jurnal-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .tag { display: inline-flex; align-items: center; gap: 4px; background: #eff6ff; color: #1d4ed8; border-radius: 6px; padding: 3px 10px; font-size: 12px; border: 1px solid #bfdbfe; }
  .tag-doi { background: #f0fdf4; color: #166534; border-color: #bbf7d0; cursor: pointer; }
  .tag-doi a { color: #166534; text-decoration: none; }
  .jurnal-abstract { font-size: 13px; color: #555; line-height: 1.6; background: #f8faff; padding: 10px; border-radius: 6px; border-left: 3px solid #93c5fd; margin-top: 8px; display: none; }
  .jurnal-abstract.show { display: block; }
  .toggle-abstract { font-size: 12px; color: #2563eb; cursor: pointer; background: none; border: none; padding: 4px 0; margin-top: 4px; font-weight: bold; }
  .file-header { background: #dbeafe; padding: 8px 12px; border-radius: 6px; font-weight: bold; margin-bottom: 10px; margin-top: 16px; color: #1e40af; display: flex; align-items: center; justify-content: space-between; }
  .badge { background: #2563eb; color: white; border-radius: 99px; padding: 2px 10px; font-size: 12px; }
  .loading { color: #2563eb; font-style: italic; margin-top: 10px; }
  .error { color: red; margin-top: 10px; }
  .summary { color: #555; margin: 10px 0; font-size: 14px; }
</style>
</head>
<body>
<div class="container">
  <h1>📚 Mesin Jurnal</h1>

  <div class="card">
    <h2>🔍 Cari Jurnal</h2>
    <label>Kata kunci pencarian</label>
    <input type="text" id="query" placeholder="contoh: peer support mental health..." onkeydown="if(event.key==='Enter') cariJurnal()">
    <button onclick="cariJurnal()" id="btnCari">Cari</button>
    <div id="hasil-cari"></div>
  </div>

  <div class="card">
    <h2>📂 Upload File Referensi</h2>
    <label>Format: .ris .pdf .txt .csv .xlsx .png .jpg (maks 4 file)</label>
    <input type="file" id="fileInput" accept=".ris,.pdf,.txt,.csv,.xlsx,.png,.jpg,.jpeg" multiple>
    <button onclick="uploadFile()" id="btnUpload">Upload & Parse</button>
    <div id="hasil-upload"></div>
  </div>
</div>

<script>
if("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js");

let abstractCounter = 0;

function renderJurnalCard(item) {
  const id = 'abs-' + (abstractCounter++);
  const penulis = Array.isArray(item.penulis) ? item.penulis.join(", ") : (item.penulis || "");
  const judul = item.judul || item.title || "(Judul tidak tersedia)";
  const link = item.link ? `<a href="${item.link}" target="_blank">${judul}</a>` : judul;

  let meta = '';
  if (item.tahun) meta += `<span class="tag">📅 ${item.tahun}</span>`;
  if (item.jurnal) meta += `<span class="tag">📖 ${item.jurnal}</span>`;
  if (penulis) meta += `<span class="tag">👤 ${penulis.length > 80 ? penulis.substring(0,80)+'...' : penulis}</span>`;
  if (item.doi) meta += `<span class="tag tag-doi"><a href="https://doi.org/${item.doi}" target="_blank">🔗 DOI: ${item.doi}</a></span>`;

  const abstrak = item.abstrak || item.snippet || "";
  const absBlock = abstrak ? `
    <button class="toggle-abstract" onclick="toggleAbs('${id}')">▼ Lihat Abstrak</button>
    <div class="jurnal-abstract" id="${id}">${abstrak}</div>` : '';

  return `<div class="jurnal-card">
    <div class="jurnal-title">${link}</div>
    <div class="jurnal-meta">${meta}</div>
    ${absBlock}
  </div>`;
}

function toggleAbs(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  el.classList.toggle('show');
  btn.textContent = el.classList.contains('show') ? '▲ Sembunyikan Abstrak' : '▼ Lihat Abstrak';
}

async function cariJurnal() {
  const q = document.getElementById('query').value.trim();
  if (!q) return alert('Masukkan kata kunci!');
  const btn = document.getElementById('btnCari');
  btn.disabled = true; btn.textContent = 'Mencari...';
  document.getElementById('hasil-cari').innerHTML = '<p class="loading">⏳ Sedang mencari jurnal...</p>';
  try {
    const res = await fetch('/cari?q=' + encodeURIComponent(q));
    const data = await res.json();
    if (!data.hasil || data.hasil.length === 0) {
      document.getElementById('hasil-cari').innerHTML = '<p>Tidak ada hasil.</p>';
      return;
    }
    let html = `<p class="summary"><b>${data.hasil.length} hasil</b> untuk "<i>${q}</i>"</p>`;
    data.hasil.forEach(item => { html += renderJurnalCard(item); });
    document.getElementById('hasil-cari').innerHTML = html;
  } catch(e) {
    document.getElementById('hasil-cari').innerHTML = `<p class="error">Error: ${e.message}</p>`;
  } finally {
    btn.disabled = false; btn.textContent = 'Cari';
  }
}

async function uploadFile() {
  const files = document.getElementById('fileInput').files;
  if (!files || files.length === 0) return alert('Pilih file dulu!');
  if (files.length > 4) return alert('Maksimal 4 file!');
  const btn = document.getElementById('btnUpload');
  btn.disabled = true; btn.textContent = 'Memproses...';
  document.getElementById('hasil-upload').innerHTML = '<p class="loading">⏳ Memproses file...</p>';
  try {
    const form = new FormData();
    for (let f of files) form.append('files', f);
    const res = await fetch('/upload', { method: 'POST', body: form });
    const data = await res.json();
    if (data.error) {
      document.getElementById('hasil-upload').innerHTML = `<p class="error">Error: ${data.error}</p>`;
      return;
    }
    let html = '';
    data.hasil.forEach(fr => {
      html += `<div class="file-header"><span>📄 ${fr.file}</span><span class="badge">${fr.total||0} jurnal</span></div>`;
      if (fr.error) {
        html += `<p class="error">${fr.error}</p>`;
      } else {
        fr.data.forEach(item => { html += renderJurnalCard(item); });
      }
    });
    document.getElementById('hasil-upload').innerHTML = html;
  } catch(e) {
    document.getElementById('hasil-upload').innerHTML = `<p class="error">Error: ${e.message}</p>`;
  } finally {
    btn.disabled = false; btn.textContent = 'Upload & Parse';
  }
}
</script>
</body>
</html>
